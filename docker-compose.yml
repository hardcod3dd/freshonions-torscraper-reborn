services:
  db:
    image: mariadb:10.5.8
    restart: always
    command: >
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=4G
      --innodb-buffer-pool-instances=4
      --innodb-log-file-size=256M
      --innodb-flush-log-at-trx-commit=2
      --innodb-flush-method=O_DIRECT
      --max-connections=300
      --query-cache-size=0
      --query-cache-type=0
      --tmp-table-size=256M
      --max-heap-table-size=256M
    deploy:
      resources:
        limits:
          memory: 6gb
        reservations:
          memory: 5gb
    environment:
      MYSQL_ROOT_PASSWORD: 8SLK3Bny
      MYSQL_DATABASE: tor
    volumes:
      - my-datavolume:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p8SLK3Bny"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  memcached:
    image: memcached
    ports:
      - "127.0.0.1:11211:11211"
    entrypoint:
      - memcached
      - -m 512

  proxy:
    hostname: proxy
    image: dockage/tor-privoxy
    restart: always
    ports:
      - 127.0.0.1:8118:8118
      - 127.0.0.1:9050:9050
      - 127.0.0.1:9051:9051

  adminer:
    depends_on:
      db:
        condition: service_healthy
    image: adminer
    restart: always
    ports:
      - 127.0.0.1:8080:8080

  scrapy:
    depends_on:
      db:
        condition: service_healthy
      proxy:
        condition: service_started
      memcached:
        condition: service_started
      elastic:
        condition: service_healthy
    image: fresh/scrapper
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 4gb
        reservations:
          memory: 1gb
    environment:
      LANG: en_US.UTF-8
      ELASTICSEARCH_ENABLED: "true"
      ELASTICSEARCH_HOST: elastic
      ELASTICSEARCH_PORT: "9200"
      ELASTICSEARCH_TIMEOUT: "60"

  isup:
    depends_on:
      db:
        condition: service_healthy
      proxy:
        condition: service_started
      memcached:
        condition: service_started
      elastic:
        condition: service_healthy
    image: fresh/isup
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 2gb
        reservations:
          memory: 500m
    environment:
      LANG: en_US.UTF-8
      ELASTICSEARCH_ENABLED: "true"
      ELASTICSEARCH_HOST: elastic
      ELASTICSEARCH_PORT: "9200"
      ELASTICSEARCH_TIMEOUT: "60"

  frontend:
    depends_on:
      db:
        condition: service_healthy
      memcached:
        condition: service_started
      elastic:
        condition: service_healthy
    image: fresh/frontend
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 2gb
        reservations:
          memory: 500m
    environment:
      LANG: en_US.UTF-8
      ELASTICSEARCH_ENABLED: "true"
      ELASTICSEARCH_HOST: elastic
      ELASTICSEARCH_PORT: "9200"
      ELASTICSEARCH_TIMEOUT: "60"
    ports:
      - 127.0.0.1:5000:5000

  elastic:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.13
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 7gb
        reservations:
          memory: 5gb
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    environment:
      - LANG=en_US.UTF-8
      - node.name=elastic
      - cluster.name=onion
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms4g -Xmx4g"
      - indices.memory.index_buffer_size=20%
    ports:
      - 127.0.0.1:9200:9200
      - 127.0.0.1:9500:9500
    volumes:
      - my-esvolume:/usr/share/elasticsearch/data

  kibana:
    depends_on:
      - elastic
    image: docker.elastic.co/kibana/kibana:7.17.3
    restart: on-failure
    deploy:
      resources:
        limits:
          memory: 1gb
        reservations:
          memory: 500mb
    environment:
      - SERVERNAME=kibana
      - ELASTICSEARCH_HOSTS=http://elastic:9200
    ports:
      - 127.0.0.1:5601:5601

volumes:
  my-datavolume:
  my-esvolume:
